server:
  bind: "0.0.0.0:3000"

logging:
  level: "info"
  stderr: true
  stderr_ansi: false
  file:
    enabled: true
    directory: "logs"
    rotation: "daily"
    filename_prefix: "openjarvis"
    filename_suffix: "log"
    max_files: 7

session:
  persistence:
    backend: "sqlite"
    sqlite:
      path: "data/openjarvis/session.sqlite3"

feishu:
  mode: "long_connection"
  webhook_path: "/webhook/feishu"
  open_base_url: "https://open.feishu.cn"
  app_id: "cli_xxx"
  app_secret: "xxx"
  verification_token: ""
  encrypt_key: ""
  dry_run: true
  auto_start_sidecar: true
  node_bin: "node"
  sidecar_script: "scripts/feishu_ws_client.mjs"

agent:
  hook: {}
  compact:
    enabled: false
    auto_compact: false
    runtime_threshold_ratio: 0.85
    tool_visible_threshold_ratio: 0.70
    reserved_output_tokens: 1024
    # mock_compacted_assistant: "这是压缩后的上下文，请基于这些信息继续当前任务：..."
  # 示例:
  # hook:
  #   user_prompt_submit: ["echo", "user prompt submitted"]
  #   pre_tool_use: ["echo", "tool about to run"]

llm:
  provider: "mock"
  model: "mock-received"
  base_url: "https://api.deepseek.com"
  api_key: ""
  api_key_path: ""
  mock_response: "[openjarvis][DEBUG] 测试回复"
  # 生产模型请按实际规格填写；例如 kimi-k2.5 为 262144 / 32768。
  context_window_tokens: 8192
  max_output_tokens: 1024
  tokenizer: "chars_div4"
